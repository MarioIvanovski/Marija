<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Покана - Роденденски Јубилеј 50</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fff0f5 0%, #ffe8f0 40%, #fff5e0 100%);
    font-family: 'Lato', sans-serif;
    padding: 30px 20px;
  }
  .card {
    width: 520px;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.15);
    position: relative;
  }
  .confetti-stripe {
    height: 12px;
    background: repeating-linear-gradient(90deg,
      #ff6b9d 0px,#ff6b9d 18px,
      #ffd93d 18px,#ffd93d 36px,
      #6bcb77 36px,#6bcb77 54px,
      #4d96ff 54px,#4d96ff 72px,
      #ff9f43 72px,#ff9f43 90px
    );
  }
  .photo-wrap {
    position: relative;
    height: 440px;
    overflow: hidden;
    background: #111;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 12%;
    display: block;
  }
  .photo-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to top,
      rgba(0,0,0,0.82) 0%,
      rgba(0,0,0,0.45) 55%,
      transparent 100%
    );
  }
  .big-fifty {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    text-align: center;
    width: 100%;
    line-height: 1;
  }
  .big-fifty span {
    font-family: 'Playfair Display', serif;
    font-size: 140px;
    font-weight: 900;
    background: linear-gradient(180deg, #ffe066 0%, #f5c518 30%, #c8922a 60%, #f5d06e 80%, #a0700e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    letter-spacing: -4px;
  }
  .big-fifty .anni {
    display: block;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    margin-top: -10px;
    -webkit-text-fill-color: rgba(255,255,255,0.85);
    filter: none;
  }
  .info {
    padding: 24px 36px 28px;
    text-align: center;
    background: white;
  }
  .pokana-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8922a;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .povod {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #222;
    font-weight: 700;
    margin-bottom: 18px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 18px;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid #f0c060; }
  .divider span { font-size: 16px; }
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .detail-box {
    background: linear-gradient(135deg, #fffaf0, #fff5e0);
    border: 1px solid #f5d080;
    border-radius: 14px;
    padding: 14px 10px;
  }
  .detail-box.full { grid-column: 1 / -1; }

  /* CLICKABLE LOCATION BOX */
  a.detail-box {
    display: block;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  a.detail-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200,146,42,0.25);
    border-color: #c8922a;
  }
  a.detail-box:active {
    transform: translateY(0px);
  }
  .maps-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #c8922a;
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .detail-icon { font-size: 20px; margin-bottom: 5px; }
  .detail-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8922a;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .detail-value {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: #222;
    font-weight: 700;
  }
  .detail-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .closing {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: #c8922a;
    font-style: italic;
  }
</style>
</head>
